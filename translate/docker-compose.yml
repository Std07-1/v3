# Етап 1: nginx (PWA) -> FastAPI -> Redis.
# Запуск:  docker compose up --build
# За замовч. engine=nllb. Для легкого старту без моделі: TRANSLATE_ENGINE=mock.
services:
  redis:
    image: redis:7-alpine
    restart: unless-stopped
    command: ["redis-server", "--save", "", "--appendonly", "no"]
    networks: [tr]

  backend:
    build: ./backend
    restart: unless-stopped
    environment:
      TRANSLATE_ENGINE: ${TRANSLATE_ENGINE:-nllb}
      TRANSLATE_REDIS_URL: redis://redis:6379/0
      TRANSLATE_NLLB_MODEL_DIR: /models/nllb-200-distilled-600M-int8
    volumes:
      # Сюди клади сконвертовану модель (scripts/convert_nllb.sh).
      - ./backend/models:/models:ro
    depends_on: [redis]
    networks: [tr]

  nginx:
    image: nginx:1.27-alpine
    restart: unless-stopped
    ports:
      - "8080:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/conf.d/default.conf:ro
      - ./frontend:/usr/share/nginx/html:ro
    depends_on: [backend]
    networks: [tr]

networks:
  tr: {}
