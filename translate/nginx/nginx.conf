# nginx: статика PWA + reverse-proxy на FastAPI.
server {
    listen 80;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    # Стиснення тексту — швидше завантаження shell.
    gzip on;
    gzip_types text/css application/javascript application/json image/svg+xml;
    gzip_min_length 512;

    # API -> backend.
    location /api/ {
        proxy_pass http://backend:8000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_read_timeout 60s;
    }

    # Service worker не кешуємо у браузері (щоб оновлення доходили).
    location = /sw.js {
        add_header Cache-Control "no-cache";
        try_files $uri =404;
    }

    # SPA/PWA fallback на index.html.
    location / {
        try_files $uri $uri/ /index.html;
    }
}
