<!DOCTYPE html>
<html lang="uk">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
    <meta name="description"
        content="AiOne SMC Trading Platform — real-time institutional order flow analysis, Smart Money Concepts overlay, multi-timeframe charts" />
    <!-- Cache-bust: force mobile/TG browsers to always fetch fresh HTML -->
    <meta http-equiv="Cache-Control" content="no-store, no-cache, must-revalidate" />
    <meta http-equiv="Pragma" content="no-cache" />
    <meta http-equiv="Expires" content="0" />
    <title>AI · ONE v3</title>
    <style>
        /* ADR-0066 PATCH 05: minimal token stub in <head> to avoid FOUC
           before tokens.css loads via main.ts. Values mirror tokens.css
           dark canonical (--bg / --text-1). Full token system arrives at
           runtime via main.ts import. */
        :root {
            --bg: #0D1117;
            --text-1: #E6EDF3;
        }

        html,
        body {
            margin: 0;
            padding: 0;
            height: 100%;
            height: var(--app-vh, 100dvh);
            overflow: hidden;
            overscroll-behavior: none;
            touch-action: pan-x pan-y;
            -ms-touch-action: pan-x pan-y;
            -webkit-tap-highlight-color: transparent;
            background: var(--bg);
            color: var(--text-1);
            font-family: system-ui, -apple-system, sans-serif;
        }

        /* P3: eliminate 300ms tap delay on interactive elements */
        button,
        a,
        [role="button"] {
            touch-action: manipulation;
        }

        #app {
            height: 100%;
        }
    </style>
</head>

<body>
    <div id="app"></div>
    <script type="module" src="/src/main.ts"></script>
</body>

</html>
