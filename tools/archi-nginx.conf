# Archi Console — private subdomain
# Serve SPA from /opt/smc-v3/ui_archi/dist/
# API /api/archi/* proxied to ws_server :8000

server {
    listen 80;
    server_name archi.aione-smc.com;

    server_tokens off;

    # ─── SECURITY: block scanners ───
    location ~* ^/(wp-login|wp-admin|xmlrpc|phpmyadmin|pma|adminer|cgi-bin) {
        access_log off;
        return 444;
    }
    location ~ /\.(env|git|svn|htaccess|htpasswd) {
        access_log off;
        return 444;
    }
    location ~* \.(php|asp|aspx|jsp|cgi|pl)$ {
        access_log off;
        return 444;
    }

    client_max_body_size 1m;

    gzip on;
    gzip_types text/css application/javascript application/json;
    gzip_min_length 256;
    gzip_vary on;

    # ─── Static SPA ───
    root /opt/smc-v3/ui_archi/dist;
    index index.html;

    # Hashed assets — immutable cache
    location /assets/ {
        add_header Cache-Control "public, max-age=31536000, immutable";
        add_header X-Content-Type-Options "nosniff" always;
        try_files $uri =404;
    }

    # HTML — never cache
    location / {
        add_header Cache-Control "no-store, no-cache, must-revalidate" always;
        add_header X-Frame-Options "DENY" always;
        add_header X-Content-Type-Options "nosniff" always;
        add_header X-XSS-Protection "1; mode=block" always;
        add_header Referrer-Policy "no-referrer" always;
        add_header Content-Security-Policy "default-src 'self'; script-src 'self' 'unsafe-inline'; style-src 'self' 'unsafe-inline'; connect-src 'self' https://archi.aione-smc.com; img-src 'self' data:; font-src 'self'; frame-ancestors 'none';" always;
        try_files $uri $uri/ /index.html;
        error_page 405 =200 /index.html;
    }

    # ─── API proxy → ws_server :8000 ───
    location /api/archi/ {
        proxy_pass http://127.0.0.1:8000/api/archi/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        # Forward Authorization header for Bearer token auth
        proxy_set_header Authorization $http_authorization;
        proxy_read_timeout 30s;
    }
}
