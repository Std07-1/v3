# www → non-www redirect (prevents ws://www.aione-smc.com/ws mismatch)
server {
    listen 80;
    server_name www.aione-smc.com;
    return 301 https://aione-smc.com$request_uri;
}

server {
    listen 80;
    server_name aione-smc.com;

    # ─── HIDE NGINX VERSION ───
    server_tokens off;

    # ─── BOT / SCANNER TRAP — return 444 (drop connection) ───
    location ~* ^/(wp-login|wp-admin|xmlrpc|wp-includes|wp-content|phpmyadmin|pma|adminer|cgi-bin|\.well-known/security\.txt) {
        access_log off;
        return 444;
    }
    # Block .env / .git / config file scanning
    location ~ /\.(env|git|svn|htaccess|htpasswd|DS_Store) {
        access_log off;
        return 444;
    }
    # Block common exploit paths
    location ~* \.(php|asp|aspx|jsp|cgi|pl)$ {
        access_log off;
        return 444;
    }

    # ─── REQUEST SIZE LIMIT (blocks massive payload attacks) ───
    client_max_body_size 1m;
    client_body_buffer_size 16k;
    client_header_buffer_size 1k;
    large_client_header_buffers 4 8k;

    # ─── RATE LIMITING (uses zones from smc_limits.conf) ───
    limit_req zone=smc_http burst=30 nodelay;
    limit_conn smc_conn 20;

    # gzip on origin — Cloudflare pass-through for non-cached
    gzip on;
    gzip_types text/css application/javascript application/json text/xml image/svg+xml;
    gzip_min_length 256;
    gzip_vary on;

    # Static Svelte UI — nginx роздає напряму (швидше ніж через :8000)
    root /opt/smc-v3/ui_v4/dist;
    index index.html;

    # Hashed assets — immutable long cache + CORS for module scripts
    location /assets/ {
        add_header Cache-Control "public, max-age=31536000, immutable";
        add_header Access-Control-Allow-Origin "*";
        add_header X-Content-Type-Options "nosniff" always;
        add_header X-Frame-Options "SAMEORIGIN" always;
        add_header Referrer-Policy "strict-origin-when-cross-origin" always;
        try_files $uri =404;
    }

    # HTML = never store (mobile browsers + TG WebView aggressively cache)
    location / {
        add_header Cache-Control "no-store, no-cache, must-revalidate, proxy-revalidate" always;
        add_header Pragma "no-cache" always;
        add_header Expires "0" always;
        add_header X-Frame-Options "SAMEORIGIN" always;
        add_header X-Content-Type-Options "nosniff" always;
        add_header X-XSS-Protection "1; mode=block" always;
        add_header Referrer-Policy "strict-origin-when-cross-origin" always;
        add_header Permissions-Policy "camera=(), microphone=(), geolocation=()" always;
        add_header Content-Security-Policy "default-src 'self'; script-src 'self' 'unsafe-inline'; style-src 'self' 'unsafe-inline'; connect-src 'self' wss://aione-smc.com ws://aione-smc.com; img-src 'self' data:; font-src 'self'; frame-ancestors 'none';" always;
        try_files $uri $uri/ /index.html;
        # SPA fallback: browser extensions / form auto-submit may POST to root.
        # Match historical behavior (pre-ADR-0058) to keep client console clean.
        # Real API methods are served from /api/* (proxied), not from /.
        error_page 405 =200 /index.html;
    }

    # API status → ws_server (:8000) — MUST be before regex catch-all
    location = /api/status {
        limit_req zone=smc_http burst=10 nodelay;
        proxy_pass http://127.0.0.1:8000/api/status;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # WebSocket → ws_server (:8000)
    location /ws {
        proxy_pass http://127.0.0.1:8000;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_read_timeout 86400s;
        proxy_send_timeout 86400s;
    }

    # ─── /api/v3/* — Public read-only API (ADR-0058 slice 058.3) ───
    # Rate limit: 2r/s (120 req/min) per IP, burst 30 nodelay (F-S1-002 defense-in-depth).
    # Auth: handled in-process by ws_server (TokenStore via X-API-Key header).
    # Cache: never store — token-scoped responses must not be shared.
    # OWASP A05 (slice 058.5): nginx-level method whitelist — only GET/HEAD/OPTIONS.
    # OWASP A08 (slice 058.5): empty CORS — no browser cross-origin reads of token-scoped data.
    location /api/v3/ {
        limit_except GET HEAD OPTIONS {
            deny all;
        }

        limit_req zone=api_v3 burst=30 nodelay;
        limit_conn smc_conn 20;

        proxy_pass http://127.0.0.1:8000;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        # X-API-Key header is auto-forwarded (proxy_pass_request_headers on by default)

        proxy_connect_timeout 5s;
        proxy_read_timeout 30s;
        proxy_send_timeout 30s;

        # Never cache: each token-scoped response is fresh per request
        add_header Cache-Control "no-store, no-cache, must-revalidate" always;
        add_header X-Content-Type-Options "nosniff" always;
        add_header Referrer-Policy "no-referrer" always;
        # Empty CORS — explicitly disallow browser cross-origin fetch.
        # Server-to-server consumers (curl, requests) ignore CORS entirely.
        add_header Access-Control-Allow-Origin "" always;
    }

    # ─── DENY suspicious paths (444 = drop connection) ───
    location ~* ^/(admin|login|dashboard|console|debug) {
        return 444;
    }
}
