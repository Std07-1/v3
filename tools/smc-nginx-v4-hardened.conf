# www → non-www redirect (prevents ws://www.aione-smc.com/ws mismatch)
server {
    listen 80;
    server_name www.aione-smc.com;
    return 301 https://aione-smc.com$request_uri;
}

server {
    listen 80;
    server_name aione-smc.com;

    # ─── HIDE NGINX VERSION ───
    server_tokens off;

    # ─── BOT / SCANNER TRAP — return 444 (drop connection) ───
    location ~* ^/(wp-login|wp-admin|xmlrpc|wp-includes|wp-content|phpmyadmin|pma|adminer|cgi-bin|\.well-known/security\.txt) {
        access_log off;
        return 444;
    }
    # Block .env / .git / config file scanning
    location ~ /\.(env|git|svn|htaccess|htpasswd|DS_Store) {
        access_log off;
        return 444;
    }
    # Block common exploit paths
    location ~* \.(php|asp|aspx|jsp|cgi|pl)$ {
        access_log off;
        return 444;
    }

    # ─── REQUEST SIZE LIMIT (blocks massive payload attacks) ───
    client_max_body_size 1m;
    client_body_buffer_size 16k;
    client_header_buffer_size 1k;
    large_client_header_buffers 4 8k;

    # ─── RATE LIMITING (uses zones from smc_limits.conf) ───
    limit_req zone=smc_http burst=30 nodelay;
    limit_conn smc_conn 20;

    # gzip on origin — Cloudflare pass-through for non-cached
    gzip on;
    gzip_types text/css application/javascript application/json text/xml image/svg+xml;
    gzip_min_length 256;
    gzip_vary on;

    # Static Svelte UI — nginx роздає напряму (швидше ніж через :8000)
    root /opt/smc-v3/ui_v4/dist;
    index index.html;

    # Hashed assets — immutable long cache + CORS for module scripts
    location /assets/ {
        add_header Cache-Control "public, max-age=31536000, immutable";
        add_header Access-Control-Allow-Origin "*";
        add_header X-Content-Type-Options "nosniff" always;
        add_header X-Frame-Options "SAMEORIGIN" always;
        add_header Referrer-Policy "strict-origin-when-cross-origin" always;
        try_files $uri =404;
    }

    # HTML = never store (mobile browsers + TG WebView aggressively cache)
    location / {
        add_header Cache-Control "no-store, no-cache, must-revalidate, proxy-revalidate" always;
        add_header Pragma "no-cache" always;
        add_header Expires "0" always;
        add_header X-Frame-Options "SAMEORIGIN" always;
        add_header X-Content-Type-Options "nosniff" always;
        add_header X-XSS-Protection "1; mode=block" always;
        add_header Referrer-Policy "strict-origin-when-cross-origin" always;
        add_header Permissions-Policy "camera=(), microphone=(), geolocation=()" always;
        add_header Content-Security-Policy "default-src 'self'; script-src 'self' 'unsafe-inline' static.cloudflareinsights.com; style-src 'self' 'unsafe-inline'; connect-src 'self' wss://aione-smc.com ws://aione-smc.com https://cloudflareinsights.com; img-src 'self' data:; font-src 'self'; frame-ancestors 'none';" always;
        try_files $uri $uri/ /index.html;
    }

    # API status → ws_server (:8000) — MUST be before regex catch-all
    location = /api/status {
        limit_req zone=smc_http burst=10 nodelay;
        proxy_pass http://127.0.0.1:8000/api/status;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # WebSocket → ws_server (:8000)
    location /ws {
        proxy_pass http://127.0.0.1:8000;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_read_timeout 86400s;
        proxy_send_timeout 86400s;
    }

    # ─── DENY suspicious paths (444 = drop connection) ───
    location ~* ^/(admin|login|dashboard|console|debug) {
        return 444;
    }
}
