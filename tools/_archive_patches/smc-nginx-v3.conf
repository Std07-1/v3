server {
    listen 80;
    server_name aione-smc.com www.aione-smc.com;

    # Static Svelte UI
    root /opt/smc-v3/ui_v4/dist;
    index index.html;

    # Hashed assets — immutable cache, correct MIME, NO SPA fallback
    location /assets/ {
        add_header Cache-Control "public, max-age=31536000, immutable";
        add_header X-Content-Type-Options nosniff;
        try_files $uri =404;
    }

    # SPA fallback — only for non-asset routes
    location / {
        add_header Cache-Control "no-cache";
        try_files $uri $uri/ /index.html;
    }

    # API status → ws_server (:8000)
    location /api/status {
        proxy_pass http://127.0.0.1:8000/api/status;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }

    # WebSocket → ws_server (:8000)
    location /ws {
        proxy_pass http://127.0.0.1:8000;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_read_timeout 86400s;
        proxy_send_timeout 86400s;
    }
}
