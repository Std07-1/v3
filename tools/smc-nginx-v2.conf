# www → non-www redirect (prevents ws://www.aione-smc.com/ws mismatch)
server {
    listen 80;
    server_name www.aione-smc.com;
    return 301 https://aione-smc.com$request_uri;
}

server {
    listen 80;
    server_name aione-smc.com;

    # gzip on origin — Cloudflare pass-through for non-cached
    gzip on;
    gzip_types text/css application/javascript application/json text/xml image/svg+xml;
    gzip_min_length 256;
    gzip_vary on;

    # Static Svelte UI — nginx роздає напряму (швидше ніж через :8000)
    root /opt/smc-v3/ui_v4/dist;
    index index.html;

    # Hashed assets — immutable long cache + CORS for module scripts
    location /assets/ {
        add_header Cache-Control "public, max-age=31536000, immutable";
        add_header Access-Control-Allow-Origin "*";
        try_files $uri =404;
    }

    # HTML = never store (mobile browsers + TG WebView aggressively cache)
    location / {
        add_header Cache-Control "no-store, no-cache, must-revalidate, proxy-revalidate" always;
        add_header Pragma "no-cache" always;
        add_header Expires "0" always;
        try_files $uri $uri/ /index.html;
    }

    # API status → ws_server (:8000)
    location /api/status {
        proxy_pass http://127.0.0.1:8000/api/status;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }

    # WebSocket → ws_server (:8000)
    location /ws {
        proxy_pass http://127.0.0.1:8000;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_read_timeout 86400s;
        proxy_send_timeout 86400s;
    }
}
